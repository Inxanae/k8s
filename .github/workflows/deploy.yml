name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build User Service
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest ./user-service

    - name: Build Order Service
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest ./order-service

    - name: Push User Service
      run: docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest

    - name: Push Order Service
      run: docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest

    - name: Set Kubeconfig
  run: |
    mkdir -p $HOME/.kube
    echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/
        kubectl rollout restart deployment user-service
        kubectl rollout restart deployment order-service